name: Frage stellen
description: Stelle eine allgemeine Frage an die Community
title: "[Frage]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für deine Frage! Bitte fülle die Felder unten aus.

  - type: textarea
    id: question
    attributes:
      label: Deine Frage
      description: Beschreibe dein Problem so genau wie möglich
      placeholder: "Ich versuche gerade..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Kontext
      description: Code, Screenshots oder Hintergrundinfos
      placeholder: "Ich benutze Version X..."
    validations:
      required: false
