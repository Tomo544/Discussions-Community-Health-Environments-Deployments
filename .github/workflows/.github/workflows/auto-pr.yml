name: Auto PR staging → main

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Create Pull Request via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:staging`,
              base: "main",
              state: "open"
            });

            if (prs.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: "staging",
                base: "main",
                title: "🚀 Auto PR: staging → main",
                body: "Automatisch erstellt aus staging branch"
              });
            } else {
              console.log("PR exists already");
            }
